services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: organizeMe-v2-api:latest
    container_name: organizeMe_v2_api
    environment:
      CORS_ORIGIN: http://localhost:5174
    ports:
      - "8001:8001"
    volumes:
      - ./api/app:/app/app
    restart: unless-stopped

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    image: organizeMe-v2-worker:latest
    container_name: organizeMe_v2_worker
    volumes:
      - ./worker:/app
    depends_on:
      - api
    restart: unless-stopped

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: organizeMe-v2-frontend:latest
    container_name: organizeMe_v2_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8001
    ports:
      - "5174:5174"
    volumes:
      - ./web:/app
      - /app/node_modules
    restart: unless-stopped
